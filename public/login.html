<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<script>

async function entrar(){

let r = await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user:user.value,
pass:pass.value

})

})

let d = await r.json()

if(d.ok){

location="pedidos.html"

}else{

alert("Erro")

}

}

</script>

</body>
</html>
