<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container">

<h2 class="mt-3">Pedidos</h2>

<input id="cliente" class="form-control mb-2" placeholder="Cliente">
<input id="produto" class="form-control mb-2" placeholder="Produto">
<input id="qtd" class="form-control mb-2" placeholder="Quantidade">

<button onclick="salvar()" class="btn btn-success">
Salvar
</button>

<hr>

<ul id="lista" class="list-group"></ul>

<script>

async function salvar(){

await fetch("/pedidos",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

cliente:cliente.value,
produto:produto.value,
qtd:qtd.value

})

})

carregar()

}


async function status(id,s){

await fetch("/pedidos/"+id,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

status:s

})

})

carregar()

}


async function excluir(id){

await fetch("/pedidos/"+id,{

method:"DELETE"

})

carregar()

}


async function carregar(){

let r = await fetch("/pedidos")

let dados = await r.json()

lista.innerHTML=""

dados.forEach(p=>{

let li=document.createElement("li")

li.className="list-group-item"

li.innerHTML=

p.cliente+" - "+p.produto+
" | "+p.status+

` 
<button onclick="status(${p.id},'Produção')" class="btn btn-warning btn-sm">Produção</button>
<button onclick="status(${p.id},'Pronto')" class="btn btn-info btn-sm">Pronto</button>
<button onclick="status(${p.id},'Entregue')" class="btn btn-success btn-sm">Entregue</button>
<button onclick="excluir(${p.id})" class="btn btn-danger btn-sm">X</button>
`

lista.appendChild(li)

})

}

carregar()

</script>

</body>
</html>
